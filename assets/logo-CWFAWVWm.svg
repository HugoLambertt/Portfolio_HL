<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="cyberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7000ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Hexagonal Shield Background -->
  <path d="M100 10 L178 55 L178 145 L100 190 L22 145 L22 55 Z" 
        fill="none" 
        stroke="url(#cyberGradient)" 
        stroke-width="4" 
        filter="url(#glow)" />
  
  <!-- Technical Inner Accents -->
  <path d="M40 65 L40 55 L50 55" fill="none" stroke="#00f2fe" stroke-width="2" />
  <path d="M160 135 L160 145 L150 145" fill="none" stroke="#7000ff" stroke-width="2" />
  
  <!-- The 'D' Character - Modern/Digital Style -->
  <path d="M75 60 L75 140 M75 60 L110 60 C135 60 145 80 145 100 C145 120 135 140 110 140 L75 140" 
        fill="none" 
        stroke="url(#cyberGradient)" 
        stroke-width="12" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)" />
        
  <!-- Digital Bits/Dots -->
  <circle cx="100" cy="100" r="3" fill="#00f2fe" />
  <circle cx="75" cy="100" r="2" fill="#7000ff" />
</svg>
